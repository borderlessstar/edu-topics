name: weekly-education-topics

on:
  schedule:
    - cron: "0 21 * * 0"   # 毎週月曜 6:00 JST（日曜 21:00 UTC）に自動実行
  workflow_dispatch:        # 手動でも「Run workflow」ボタンで実行できる

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect topics
        run: python collect_topics.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ideas.csv weekly.md
          git diff --staged --quiet || git commit -m "Add weekly education topics"
          git pull --rebase
          git push
